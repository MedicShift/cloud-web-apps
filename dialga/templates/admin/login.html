<!-- templates/admin/login.html -->
<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <style>
        body {
            background: #fdf2f2;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            width: 300px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            text-align: center;
        }
        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
        }
        button {
            width: 100%;
            padding: 10px;
            background: black;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        a {
            color: blue;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="card">
        <h2>Login</h2>

        <form method="POST">
            {% csrf_token %}
            <input type="email" name="email" placeholder="email" required>
            <input type="password" name="password" placeholder="password" required>

            <button type="submit">Login</button>
        </form>

        <p>Don't have an account? <a href="/admin/register/">Signup</a></p>
    </div>
</body>
</html>
