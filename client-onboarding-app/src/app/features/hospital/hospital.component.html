<div class="container">
  <div class="header">
    <h2>Hospitals</h2>
    <button class="add-btn" (click)="openAddHospitalDialog()">➕ Add Hospital</button>
  </div>

  <div class="search-filter-row">
  <input type="text" placeholder="🔍 Search hospitals..." [(ngModel)]="searchTerm" (input)="onSearchChange()" class="search-box" />
  
  <div class="filter-tabs">
    <button [class.active]="selectedStatus === 'All'" (click)="setStatusFilter('All')">All</button>
    <button [class.active]="selectedStatus === 'Active'" (click)="setStatusFilter('Active')">Active</button>
    <button [class.active]="selectedStatus === 'Onboarding'" (click)="setStatusFilter('Onboarding')">Onboarding</button>
    <button [class.active]="selectedStatus === 'Inactive'" (click)="setStatusFilter('Inactive')">Inactive</button>
  </div>
</div>

  <div class="card-grid">
    <div class="card" *ngFor="let hospital of filteredHospitals">
      <div class="card-header">
        <h3>{{ hospital.name }}</h3>
        <span class="status" [ngClass]="hospital.status.toLowerCase()">{{ hospital.status }}</span>
      </div>

      <div class="card-body">
        <p><i class="fas fa-map-marker-alt"></i> {{ hospital.address }}</p>
        <p><i class="fas fa-envelope"></i> {{ hospital.email }}</p>
        <p><i class="fas fa-phone"></i> {{ hospital.phone }}</p>
        <p>
          <i class="fas fa-user-shield"></i> {{ hospital.admins }} Admins &nbsp;&nbsp;
          <i class="fas fa-users"></i> {{ hospital.users }} Users
        </p>
      </div>

      <div class="card-footer">
        <button class="details-btn">View Details</button>
        <button *ngIf="hospital.status === 'Active'" class="action-btn">Send Message</button>
        <button *ngIf="hospital.status === 'Onboarding'" class="action-btn">Complete Setup</button>
        <button *ngIf="hospital.status === 'Inactive'" class="action-btn">Activate</button>
      </div>
    </div>
  </div>
</div>
