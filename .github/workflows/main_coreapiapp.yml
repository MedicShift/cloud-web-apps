name: Build and deploy ASP.Net Core app to Azure Web App - CoreApiApp

on:
  push:
    branches:
      - main
  workflow_dispatch:   # Allows manual trigger from the GitHub UI

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read  # Required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.x'

      - name: Build with dotnet
        run: dotnet build CoreApiApp/WebApp/WebApp.csproj --configuration Release

      - name: dotnet publish
        run: dotnet publish CoreApiApp/WebApp/WebApp.csproj -c Release -o ./publish_output

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ./publish_output

  deploy:
    runs-on: windows-latest
    needs: build
    environment:
      name: 'Production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app
          path: ./publish_output

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_ACC1DF1C9731494A97088F7AE6506076 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_8ABAA5F791404EB88A383271CF5A87B7 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_B6E13518C34240D1AA82ABC74C0F1430 }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'CoreApiApp'
          slot-name: 'Production'
          package: './publish_output'
