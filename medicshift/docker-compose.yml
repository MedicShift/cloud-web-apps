version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '3000:3000'
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=medicshift_user
      - DB_PASSWORD=medicshift_password
      - DB_NAME=medicshift_db
      - JWT_SECRET=super_secret_jwt_key_change_me_in_prod
      - JWT_EXPIRATION=15m
      - REFRESH_TOKEN_SECRET=refresh_secret_change_me_in_prod
      - REFRESH_TOKEN_EXPIRATION=7d
      - PASSWORD_PEPPER=pepper_secret_change_me_in_prod
      - LOCKOUT_THRESHOLD=5
      - LOCKOUT_DURATION_MINUTES=15
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - NODE_ENV=development
      - PORT=3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - medicshift-network

  postgres:
    image: postgres:16-alpine
    ports:
      - '5432:5432'
    environment:
      - POSTGRES_USER=medicshift_user
      - POSTGRES_PASSWORD=medicshift_password
      - POSTGRES_DB=medicshift_db
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medicshift_user -d medicshift_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - medicshift-network

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - medicshift-network

volumes:
  pg-data:
  redis-data:

networks:
  medicshift-network:
    driver: bridge
